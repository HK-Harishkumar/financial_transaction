{% extends 'base.html' %}


{% block content %}


<h3>Create Branch Master</h3>


<form method="POST">


{% csrf_token %}


<div class="mb-3">

    <label>
    Branch Code
    </label>

    <input
    type="text"
    name="branch_code"
    class="form-control"
    required>

    </div>


    <div class="mb-3">

    <label>
    Branch Name
    </label>

    <input
    type="text"
    name="branch_name"
    class="form-control"
    required>

</div>







<div class="mb-3">

    <label>
    Status
    </label>


    <select
    name="status"
    class="form-control">


    <option value="ACTIVE">
    ACTIVE
    </option>


    <option value="INACTIVE">
    INACTIVE
    </option>


    </select>


</div>



    <button
    class="btn btn-success">

    Save

    </button>


    <a href="{% url 'masters:branch_list' %}" class="btn btn-secondary">
        Back
    </a>
</form>


{% endblock %}
