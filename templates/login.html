<!DOCTYPE html>
<html>

<head>

<title>
Smart Financial Transaction Analysis
</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">


<style>

body{

background:#f4f6f9;

height:100vh;

display:flex;

align-items:center;

justify-content:center;

}


.login-card{

width:400px;

}


</style>


</head>


<body>


<div class="card shadow login-card">


<div class="card-header text-center bg-primary text-white">


<h4>
Smart Financial Analysis System
</h4>


</div>



<div class="card-body">


<form method="POST" action="{% url 'masters:login' %}">


{% csrf_token %}



<div class="mb-3">


<label>
Username
</label>


<input
type="text"
name="username"
class="form-control"
placeholder="Enter Username"
required>


</div>




<div class="mb-3">


<label>
Password
</label>


<input
type="password"
name="password"
class="form-control"
placeholder="Enter Password"
required>


</div>




{% if error %}

<div class="alert alert-danger">

{{error}}

</div>

{% endif %}




<button
class="btn btn-success w-100">

Login

</button>



</form>


</div>


</div>



</body>

</html>
