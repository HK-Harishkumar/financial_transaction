<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Financial Transaction Analysis</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background-color:#f8f9fa;
        }

        .sidebar{
            min-height:100vh;
            background:#343a40;
        }

        .sidebar a{
            color:white;
            text-decoration:none;
            display:block;
            padding:12px;
        }

        .sidebar a:hover{
            background:#495057;
        }

        .main-content{
            padding:20px;
        }

    </style>

</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">

            <h4 class="text-white text-center mt-3">
                Finance System
            </h4>

            <hr class="text-white">

            <a href="{% url 'dashboard:dashboard' %}">Dashboard</a>

            <a href="{% url 'masters:vendor_list' %}">Vendor Master</a>

            <a href="{% url 'masters:gl_list' %}">GL Master</a>

            <a href="{% url 'masters:branch_list' %}">Branch Master</a>

            <a href="{% url 'transactions:transaction' %}">
                Upload Transactions
            </a>
            <a href="{% url 'transactions:transaction_summary' %}">
                Transaction Summary
        </a>
            <a href="{% url 'trialbalance:trailbalance_temp' %}">Trial Balance</a>
            <a href="{% url 'trialbalance:trialbalance_summary' %}">
    Trial Balance Summary</a>

        </div>

        <!-- Main Content -->
        <div class="col-md-10 main-content">

            <div class="card shadow-sm">

                <div class="card-body">

                    {% block content %}
                    {% endblock %}

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
